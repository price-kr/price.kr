name: Sync Keywords to Cloudflare KV

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "!data/blocklist.json"
      - "!data/whitelist.json"
      - "!data/profanity-blocklist.json"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode: auto (incremental) or full"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - full

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: blob:none
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Sync to Cloudflare KV
        working-directory: scripts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          SYNC_MODE: ${{ github.event.inputs.mode || 'auto' }}
        run: |
          echo "Sync mode: $SYNC_MODE"
          npx tsx sync-kv.ts "$SYNC_MODE"

      - name: Notify on KV Sync Failure
        if: ${{ failure() && github.run_id != '' }} # Check if any previous step in the job failed
        run: |
          echo "::error::Cloudflare KV sync failed. Manual intervention may be required."
          echo "Check the logs above for details from sync-kv.ts."
          # In a real-world scenario, this step could trigger a Slack/email notification
          # using a dedicated GitHub Action or webhook.
          # For now, we rely on the clear failure indication in the job output.
