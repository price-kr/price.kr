name: Check Votes and Auto-Merge

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  pull_request_target:
    types: [labeled] # Instant merge on admin-approved label
  workflow_dispatch:

jobs:
  check-votes:
    runs-on: ubuntu-latest
    # Skip pull_request_target runs for non-admin labels
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.label.name == 'admin-approved'
    permissions:
      pull-requests: write
      contents: write
      actions: write

    steps:
      - name: Check and merge qualifying PRs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const VOTE_THRESHOLD = 3;
            const FORBIDDEN_FILES = ['blocklist.json', 'whitelist.json', 'profanity-blocklist.json'];

            // Event-driven: only check the labeled PR
            // Schedule/manual: check all open PRs
            let prs;
            if (context.eventName === 'pull_request_target') {
              prs = [context.payload.pull_request];
            } else {
              prs = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'created',
                direction: 'asc'
              });
            }

            for (const pr of prs) {
              // Only process keyword PRs
              if (!pr.title.startsWith('[키워드 등록]') && !pr.title.startsWith('[키워드 변경]')) {
                continue;
              }

              // Security: only auto-merge PRs created by the issue automation bot
              if (pr.user.login !== 'github-actions[bot]') {
                console.log(`Skipping PR #${pr.number}: not created by automation`);
                continue;
              }

              // Security: verify PR only modifies keyword JSON files under data/
              const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              const allFilesValid = changedFiles.every(f =>
                f.filename.startsWith('data/') &&
                f.filename.endsWith('.json') &&
                !FORBIDDEN_FILES.some(bf => f.filename.endsWith(bf))
              );
              if (!allFilesValid) {
                console.log(`Skipping PR #${pr.number}: contains non-keyword file changes`);
                continue;
              }

              // Check for admin-approved label (Phase 1: admin direct approval mode)
              const labels = pr.labels.map(l => l.name);
              const isAdminApproved = labels.includes('admin-approved');

              // Non-admin PRs must wait at least 24 hours
              if (!isAdminApproved) {
                const created = new Date(pr.created_at);
                const now = new Date();
                const hoursSinceCreation = (now - created) / (1000 * 60 * 60);
                if (hoursSinceCreation < 24) continue;
              }

              // Get all reactions on PR (with pagination)
              const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });

              let thumbsUp = 0;
              let thumbsDown = 0;

              const prCreator = pr.user.login;
              for (const reaction of reactions) {
                // Exclude PR creator's own vote
                if (reaction.user.login === prCreator) continue;
                // TODO Phase 2: Check account age > 30 days
                if (reaction.content === '+1') thumbsUp++;
                if (reaction.content === '-1') thumbsDown++;
              }

              const isChange = pr.title.startsWith('[키워드 변경]');
              const threshold = isChange ? Math.ceil(VOTE_THRESHOLD * 1.5) : VOTE_THRESHOLD;

              if (isAdminApproved || (thumbsUp >= threshold && thumbsUp > thumbsDown)) {
                // Auto-merge
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                    commit_title: pr.title,
                    commit_message: isAdminApproved
                      ? `관리자 승인 병합\n\nPR #${pr.number}`
                      : `자동 병합: 찬성 ${thumbsUp} / 반대 ${thumbsDown}\n\nPR #${pr.number}`
                  });

                  console.log(`Merged PR #${pr.number}: ${pr.title}`);

                  // Explicitly trigger sync-kv because GITHUB_TOKEN merges don't fire push events
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'sync-kv.yml',
                    ref: 'main'
                  });
                  console.log(`Triggered sync-kv.yml for PR #${pr.number}`);
                } catch (err) {
                  console.error(`Failed to merge PR #${pr.number}:`, err.message);
                  // Notify on merge failure
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: `⚠️ 자동 병합에 실패했습니다: ${err.message}\n\n관리자 확인이 필요합니다.`
                  });
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: ['merge-failed']
                  });
                }
              }
            }
