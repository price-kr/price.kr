name: "키워드 변경 요청"
description: "기존 키워드의 목적지 URL 변경을 요청합니다"
title: "[키워드 변경] "
labels: ["keyword-change"]
body:
  - type: input
    id: keyword
    attributes:
      label: "변경할 키워드"
      description: "이미 등록된 키워드"
      placeholder: "만두"
    validations:
      required: true
  - type: input
    id: current_url
    attributes:
      label: "현재 URL"
      description: "현재 등록된 목적지 URL"
    validations:
      required: true
  - type: input
    id: new_url
    attributes:
      label: "새로운 URL"
      description: "변경하고자 하는 새 목적지 URL"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: "변경 이유"
      description: "URL을 변경해야 하는 이유를 설명해 주세요"
    validations:
      required: true
