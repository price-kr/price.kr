name: "버그 리포트"
description: "버그를 발견하셨나요? 알려주세요"
title: "[버그] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "버그 설명"
      description: "어떤 문제가 발생했는지 설명해 주세요"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "재현 단계"
      description: "버그를 재현하는 단계를 알려주세요"
      placeholder: |
        1. '...'에 접속
        2. '...'을 클릭
        3. 오류 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "기대 동작"
      description: "어떻게 동작해야 한다고 생각하시나요?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "실제 동작"
      description: "실제로 어떻게 동작했나요?"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "환경 정보"
      description: "브라우저, OS 등"
      placeholder: "Chrome 130, macOS 15"
    validations:
      required: false
