name: "기능 제안"
description: "새로운 기능이나 개선 사항을 제안합니다"
title: "[기능 제안] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: "제안 내용"
      description: "어떤 기능을 원하시나요?"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: "제안 이유"
      description: "이 기능이 왜 필요한지 설명해 주세요"
    validations:
      required: true
  - type: textarea
    id: expected_effect
    attributes:
      label: "기대 효과"
      description: "이 기능이 추가되면 어떤 점이 좋아질까요?"
    validations:
      required: false
